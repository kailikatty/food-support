<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Support Chat</title>

<style>

/* 🔥 RESET + BASE */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f7fb;
    overflow: hidden;
}

/* 📦 CONTAINER */
.chat-container {
    width: 100%;
    max-width: 520px;
    min-height: 80vh;
    height: 95dvh;
    margin: 20px auto;
    display: flex;
    flex-direction: column;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    overflow: hidden;
}

/* 📱 MOBILE */
@media (max-width: 600px) {
    body {
        overflow: hidden;
    }
}
    .chat-container {
        width: 100%;
        max-width: 100%;
        height: 100dvh;
        margin: 0;
        border-radius: 0;
    }
}

/* 🟢 HEADER */
.header {
    background: linear-gradient(135deg, #1fa855, #18a34a);
    color: white;
    padding: 16px;
    text-align: center;
    font-weight: 600;
    font-size: 16px;
}

/* 🔘 QUICK */
.quick-title {
    padding: 10px 12px;
    font-size: 13px;
    color: #555;
}

.quick-buttons {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 0 10px 10px;
}

.quick-buttons button {
    border: none;
    padding: 10px 14px;
    border-radius: 20px;
    background: #f1f1f1;
    cursor: pointer;
    font-size: 13px;
    transition: 0.2s;
    white-space: normal;
    flex: 1 1 auto;
    text-align: center;
}

.quick-buttons button:hover {
    background: #e2e2e2;
}

/* 💬 CHAT */
#messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
}

/* 💬 MESSAGE */
.message {
    display: flex;
    margin: 8px 0;
}

.message.user {
    justify-content: flex-end;
}

/* bubble */
.bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.4;
    animation: fadeIn 0.2s ease;
}

.user .bubble {
    background: #1fa855;
    color: white;
    border-bottom-right-radius: 6px;
}

.bot .bubble {
    background: #f1f1f1;
    border-bottom-left-radius: 6px;
}

/* ✨ animation */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(5px);}
    to {opacity:1; transform: translateY(0);}
}

/* 🔽 INPUT */
.input-area {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px;
    border-top: 1px solid #eee;
    background: white;
}

/* 📎 */
.upload-btn {
    background: #f1f1f1;
    padding: 8px 10px;
    border-radius: 50%;
    cursor: pointer;
    transition: 0.2s;
}

.upload-btn:hover {
    background: #ddd;
}

/* input */
.input-area input[type="text"] {
    flex: 1;
    padding: 10px 12px;
    border-radius: 20px;
    border: 1px solid #ddd;
    outline: none;
}

/* send */
.send-btn {
    background: #1fa855;
    color: white;
    border: none;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    transition: 0.2s;
}

.send-btn:hover {
    background: #188f49;
    transform: scale(1.05);
}

/* typing */
.typing span {
    animation: blink 1.4s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
    0%,80%,100%{opacity:0;}
    40%{opacity:1;}
}

</style>
</head>

<body>

<div class="chat-container">

    <div class="header">Food Delivery Support 💬</div>

    <div class="quick-title">
        Please describe the issue you are experiencing:
    </div>

    <div class="quick-buttons">
        <button onclick="quickSelect('My order is late')">1. Delivery delay</button>
        <button onclick="quickSelect('Wrong order')">2. Wrong order</button>
        <button onclick="quickSelect('Food issue')">3. Food issue</button>
        <button onclick="quickSelect('Not received')">4. Not received</button>
        <button onclick="quickSelect('Cancel order')">5. Cancel order</button>
        <button onclick="quickSelect('Other issue')">6. Others</button>
    </div>

    <div id="messages"></div>

    <div class="input-area">
        <label for="imageInput" class="upload-btn">📎</label>
        <input type="file" id="imageInput" hidden>

        <input type="text" id="message" placeholder="Type your message...">

        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

</div>
    
     
<script>

// ✅ INIT AFTER DOM LOAD
document.addEventListener("DOMContentLoaded", () => {

    const input = document.getElementById("message");
    const imageInput = document.getElementById("imageInput");

    /* ENTER SEND */
    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            sendMessage();
        }
    });

    /* IMAGE UPLOAD */
    if (imageInput) {
        imageInput.addEventListener("change", handleImageUpload);
    }
});
    
/* =========================
   ↕️ AUTO SCROLL
========================= */

function scrollToBottom() {
    const messages = document.getElementById("messages");
    messages.scrollTo({
        top: messages.scrollHeight,
        behavior: "smooth"   // ✨ ลื่น ๆ แบบ UX ดี
    });
}
/* =========================
   💬 ADD MESSAGE
========================= */
function addMessage(text, sender) {
    const messages = document.getElementById("messages");

    const wrapper = document.createElement("div");
    wrapper.classList.add("message", sender);

    const bubble = document.createElement("div");
    bubble.classList.add("bubble");
    bubble.innerHTML = text;

    wrapper.appendChild(bubble);
    messages.appendChild(wrapper);
    setTimeout(scrollToBottom, 50);

    messages.scrollTop = messages.scrollHeight;

    return bubble;
}


/* =========================
   ✉️ SEND MESSAGE (API)
========================= */
function sendMessage() {
    const input = document.getElementById("message");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    // 👇 loading bubble (แทน typingEl)
    const loading = addMessage(`
        <span class="typing">
            Thinking<span>.</span><span>.</span><span>.</span>
        </span>
    `, "bot");

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
    })
    .then(res => res.json())
    .then(data => {

        const intent = data.intent || "general";
        const delay = getTypingDelay(intent);

        setTimeout(() => {

        if (loading && loading.parentElement)
        {
            loading.parentElement.remove();
        }

            const bubble = addMessage("", "bot");
            typeText(bubble, data.reply);

        }, delay);
    })
    .catch(() => {
        loading.parentElement.remove();
        addMessage("⚠️ Network error. Please try again.", "bot");
    });
}


/* =========================
   🔘 QUICK BUTTON
========================= */
function quickSelect(text) {

    if (text === "Others") {
        addMessage("Others", "user");

        const bubble = addMessage("", "bot");
        typeText(bubble, "Hi! How can I help you today?");
        return;
    }

    document.getElementById("message").value = text;
    sendMessage();
}


/* =========================
   📸 IMAGE UPLOAD
========================= */
function handleImageUpload(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (ev) {

        addMessage(`<img src="${ev.target.result}" style="max-width:150px;border-radius:10px;">`, "user");

        const bubble = addMessage("", "bot");
        typeText(bubble, "Thank you for sharing the photo. 🙏 We're checking this for you now. Please wait for a moment.");

        fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: "[image_uploaded]" })
        });

        setTimeout(() => {
            const b2 = addMessage("", "bot");
            typeText(b2, "Thank you for your patience. We will proceed with your refund. You should receive it within 15 minutes to 1 hour. We sincerely apologize for the inconvenience caused.");
        }, 10000);
    };

    reader.readAsDataURL(file);
    e.target.value = ""; 
}


/* =========================
   ✨ TYPE EFFECT
========================= */
function typeText(element, text, speed = 20) {
    let i = 0;
    element.innerHTML = "";

    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        } else {
            scrollToBottom();
        }
    }

    typing();
}


/* =========================
   ⚡ DELAY
========================= */
function getTypingDelay(intent) {
    return {
        delivery_delay: 800,
        wrong_order: 900,
        food_issue: 900,
        not_received: 1000,
        cancel_order: 700
    }[intent] || 850;
}

</script>  </body>  
</html>
