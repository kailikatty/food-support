<!DOCTYPE html>
<html>
<head>
<title>Food Support Chat</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f0f2f5;
}

.chat-container {
    width: 420px;
    height: 680px;
    background: white;
    margin: 40px auto;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    overflow: hidden;
}

.header {
    background: #00b14f;
    color: white;
    padding: 16px;
    font-weight: bold;
}

.quick-title {
    padding: 10px;
    font-size: 13px;
    color: #555;
    background: #fafafa;
}

.quick-buttons {
    padding: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    background: #fafafa;
    border-bottom: 1px solid #eee;
}

.quick-buttons button {
    padding: 6px 10px;
    border: none;
    background: #e9ecef;
    border-radius: 20px;
    cursor: pointer;
}

.messages {
    flex: 1;
    padding: 12px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.message {
    display: flex;
    gap: 6px;
    margin: 6px 0;
}

.message.user {
    justify-content: flex-end;
}

.message.bot {
    justify-content: flex-start;
}

.bubble {
    padding: 10px;
    border-radius: 14px;
    max-width: 75%;
}

.user .bubble {
    background: #00b14f;
    color: white;
}

.bot .bubble {
    background: #f1f3f5;
}

.avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.user-avatar {
    background: #00b14f;
    color: white;
}

.bot-avatar {
    background: #e9ecef;
}

.time {
    font-size: 10px;
    opacity: 0.6;
}

.input-area {
    display: flex;
    border-top: 1px solid #eee;
}

input {
    flex: 1;
    padding: 14px;
    border: none;
}

button.send-btn {
    background: #00b14f;
    color: white;
    border: none;
    padding: 14px;
}

.typing {
    display: none;
    padding: 10px;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="chat-container">

<div class="header">Food Delivery Support 💬</div>

<div class="quick-title">
    Please select the issue you are experiencing:
</div>

<div class="quick-buttons">
    <button onclick="quickSelect('My order is late')">1. Delivery delay</button>
    <button onclick="quickSelect('Wrong order')">2. Wrong order</button>
    <button onclick="quickSelect('Food quality bad')">3. Food issue</button>
    <button onclick="quickSelect('Did not receive order')">4. Not received</button>
    <button onclick="quickSelect('Cancel my order')">5. Cancel order</button>
</div>

<div id="messages" class="messages"></div>

<div id="typing" class="typing">Bot is typing...</div>

<div class="input-area">
    <input id="message" placeholder="Type your message..." />
    <button class="send-btn" onclick="sendMessage()">Send</button>
</div>

</div>

<script>

let lastMessage = "";

function getTime() {
    return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function addMessage(text, sender) {
    const messages = document.getElementById("messages");

    const msg = document.createElement("div");
    msg.className = "message " + sender;

    const avatar = sender === "user"
        ? <div class="avatar user-avatar">👩</div>
        : `<div class="avatar bot-avatar">🤖</div>`;

    const bubble = `
        <div class="bubble">
            ${text}
            <div class="time">${getTime()}</div>
        </div>
    `;

    msg.innerHTML = sender === "user"
        ? bubble + avatar
        : avatar + bubble;

    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById("message");
    const text = input.value.trim();

    if (!text) return;

    lastMessage = text;

    addMessage(text, "user");
    input.value = "";

    const typing = document.getElementById("typing");
    typing.style.display = "block";

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({message: text})
    })
    .then(res => res.json())
    .then(data => {
        typing.style.display = "none";
        addMessage(data.reply, "bot");
    })
    .catch(() => {
        typing.style.display = "none";
        addMessage(`⚠️ Network error <br><button onclick="retryMessage()">Try again</button>`, "bot");
    });
}

function quickSelect(text) {
    document.getElementById("message").value = text;
    sendMessage();
}

function retryMessage() {
    if (lastMessage) {
        document.getElementById("message").value = lastMessage;
        sendMessage();
    }
}

document.getElementById("message").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        e.preventDefault();
        sendMessage();
    }
});

</script>

</body>
</html>
