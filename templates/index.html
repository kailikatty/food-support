<!DOCTYPE html>
<html>
<head>
<title>Food Support Chat</title>

<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f0f2f5;
    }

    .chat-container {
        width: 420px;
        height: 680px;
        background: white;
        margin: 40px auto;
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        overflow: hidden;
    }

    .header {
        background: #00b14f;
        color: white;
        padding: 16px;
        font-weight: bold;
        font-size: 16px;
    }

    .quick-buttons {
        padding: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        background: #fafafa;
        border-bottom: 1px solid #eee;
    }

    .quick-buttons button {
        padding: 6px 10px;
        border: none;
        background: #e9ecef;
        border-radius: 20px;
        cursor: pointer;
        font-size: 12px;
        transition: 0.2s;
    }

    .quick-buttons button:hover {
        background: #d4d4d4;
    }

    .messages {
        flex: 1;
        padding: 12px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
    }

    /* ✨ UPDATED MESSAGE STYLE */
    .message {
        display: flex;
        align-items: flex-end;
        gap: 6px;
        margin: 6px 0;
    }

    /* ✨ AVATAR */
    .avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .bot-avatar {
        background: #e9ecef;
    }

    .user-avatar {
        background: #00b14f;
        color: white;
    }

    /* ✨ BUBBLE */
    .bubble {
        padding: 10px 12px;
        border-radius: 14px;
        max-width: 75%;
        font-size: 14px;
    }

    .user .bubble {
        background: #00b14f;
        color: white;
        border-bottom-right-radius: 4px;
    }

    .bot .bubble {
        background: #f1f3f5;
        border-bottom-left-radius: 4px;
    }

    .time {
        font-size: 10px;
        opacity: 0.6;
        margin-top: 4px;
    }

    .input-area {
        display: flex;
        border-top: 1px solid #eee;
    }

    input {
        flex: 1;
        padding: 14px;
        border: none;
        outline: none;
        font-size: 14px;
    }

    button.send-btn {
        background: #00b14f;
        color: white;
        border: none;
        padding: 14px 18px;
        cursor: pointer;
    }

    button.send-btn:hover {
        background: #00913f;
    }

    .typing {
        font-size: 12px;
        color: #888;
        margin: 5px;
    }
</style>

</head>

<body>

<div class="chat-container">

<div class="header">Food Support Chat 💬</div>

<div class="quick-title">
Please select the issue:
</div>

<div class="quick-buttons">
<button onclick="quick('My order is late')">1</button>
<button onclick="quick('Wrong order')">2</button>
<button onclick="quick('Food issue')">3</button>
<button onclick="quick('Not received')">4</button>
<button onclick="quick('Cancel order')">5</button>
</div>

<div id="messages" class="messages"></div>

<div class="input-area">
<input id="msg">
<button onclick="send()">Send</button>
</div>

</div>

<script>
function getTime() {
    return new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

// ✨ Avatar + Bubble version
function addMessage(text, sender) {
    const messages = document.getElementById("messages");

    const wrapper = document.createElement("div");
    wrapper.classList.add("message", sender);

    const avatar = document.createElement("div");
    avatar.classList.add("avatar", sender === "user" ? "user-avatar" : "bot-avatar");
    avatar.innerText = sender === "user" ? "🧑" : "🤖";

    const bubble = document.createElement("div");
    bubble.classList.add("bubble");

    bubble.innerHTML = `
        ${text}
        <div class="time">${getTime()}</div>
    `;

    if (sender === "user") {
        wrapper.appendChild(bubble);
        wrapper.appendChild(avatar);
    } else {
        wrapper.appendChild(avatar);
        wrapper.appendChild(bubble);
    }

    messages.appendChild(wrapper);
    messages.scrollTop = messages.scrollHeight;

    return bubble; // 🔥 ใช้กับ typing animation
}

// ✨ typing animation (พิมพ์ทีละตัว)
function typeText(element, text, speed = 20) {
    let i = 0;
    element.innerHTML = "";

    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }

    typing();
}

// ✨ confidence-based delay
function getTypingDelay(intent) {
    const delayMap = {
        "delivery_delay": 800,
        "wrong_order": 900,
        "food_issue": 900,
        "not_received": 1000,
        "cancel_order": 700
    };

    return delayMap[intent] || 850;
}

// ✨ tone enhancer
function enhanceReply(reply, intent) {
    const apologyMap = {
        "delivery_delay": "We're really sorry for the delay 🙏 ",
        "wrong_order": "We're really sorry about the wrong order 🙏 ",
        "food_issue": "We're really sorry about the food quality 🙏 ",
        "not_received": "We're really sorry you didn't receive your order 🙏 ",
        "cancel_order": "No worries! "
    };

    if (!reply) {
        return "Sorry, something went wrong. Please try again.";
    }

    const prefix = apologyMap[intent] || "Thanks for reaching out 🙏 ";
    return prefix + reply;
}

function sendMessage() {
    const input = document.getElementById("message");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const typingEl = document.getElementById("typing");
    typingEl.style.display = "block";

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
    })
    .then(res => res.json())
    .then(data => {

        const intent = data.intent || "general";
        const delay = getTypingDelay(intent);

        setTimeout(() => {
            typingEl.style.display = "none";

            const finalReply = enhanceReply(data.reply, intent);

            // 🔥 typing animation ใช้ตรงนี้
            const bubble = addMessage("", "bot");
            typeText(bubble, finalReply);

        }, delay);
    })
    .catch(() => {
        typingEl.style.display = "none";
        addMessage("⚠️ Network error. Please try again.", "bot");
    });
}

function quickSelect(text) {
    sendMessageFromButton(text);
}

function sendMessageFromButton(text) {
    document.getElementById("message").value = text;
    sendMessage();
}

// ⌨️ ENTER = SEND
window.onload = function () {
    document.getElementById("message").addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendMessage();
        }
    });
};
</script>
</body>
</html>
