<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Support Chat</title>

<style>

/* 🔥 RESET + BASE */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f7fb;
}

/* 📦 CONTAINER */
.chat-container {
    max-width: 520px;
    height: 95vh;
    margin: 20px auto;
    display: flex;
    flex-direction: column;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    overflow: hidden;
}

/* 📱 MOBILE */
@media (max-width: 600px) {
    .chat-container {
        max-width: 100%;
        height: 100vh;
        margin: 0;
        border-radius: 0;
    }
}

/* 🟢 HEADER */
.header {
    background: linear-gradient(135deg, #1fa855, #18a34a);
    color: white;
    padding: 16px;
    text-align: center;
    font-weight: 600;
    font-size: 16px;
}

/* 🔘 QUICK */
.quick-title {
    padding: 10px 12px;
    font-size: 13px;
    color: #555;
}

.quick-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 10px 10px;
}

.quick-buttons button {
    border: none;
    padding: 8px 12px;
    border-radius: 20px;
    background: #f1f1f1;
    cursor: pointer;
    font-size: 13px;
    transition: 0.2s;
}

.quick-buttons button:hover {
    background: #e2e2e2;
}

/* 💬 CHAT */
#messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
}

/* 💬 MESSAGE */
.message {
    display: flex;
    margin: 8px 0;
}

.message.user {
    justify-content: flex-end;
}

/* bubble */
.bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.4;
    animation: fadeIn 0.2s ease;
}

.user .bubble {
    background: #1fa855;
    color: white;
    border-bottom-right-radius: 6px;
}

.bot .bubble {
    background: #f1f1f1;
    border-bottom-left-radius: 6px;
}

/* ✨ animation */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(5px);}
    to {opacity:1; transform: translateY(0);}
}

/* 🔽 INPUT */
.input-area {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px;
    border-top: 1px solid #eee;
    background: white;
}

/* 📎 */
.upload-btn {
    background: #f1f1f1;
    padding: 8px 10px;
    border-radius: 50%;
    cursor: pointer;
    transition: 0.2s;
}

.upload-btn:hover {
    background: #ddd;
}

/* input */
.input-area input[type="text"] {
    flex: 1;
    padding: 10px 12px;
    border-radius: 20px;
    border: 1px solid #ddd;
    outline: none;
}

/* send */
.send-btn {
    background: #1fa855;
    color: white;
    border: none;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    transition: 0.2s;
}

.send-btn:hover {
    background: #188f49;
    transform: scale(1.05);
}

/* typing */
.typing span {
    animation: blink 1.4s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
    0%,80%,100%{opacity:0;}
    40%{opacity:1;}
}

</style>
</head>

<body>

<div class="chat-container">

    <div class="header">Food Delivery Support Chat 💬</div>

    <div class="quick-title">
        Please describe the issue you are experiencing:
    </div>

    <div class="quick-buttons">
        <button onclick="quickSelect('My order is late')">1. Delivery delay</button>
        <button onclick="quickSelect('Wrong order')">2. Wrong order</button>
        <button onclick="quickSelect('Food issue')">3. Food issue</button>
        <button onclick="quickSelect('Not received')">4. Not received</button>
        <button onclick="quickSelect('Cancel order')">5. Cancel order</button>
        <button onclick="quickSelect('Other issue')">6. Others</button>
    </div>

    <div id="messages"></div>

    <div class="input-area">
        <label for="imageInput" class="upload-btn">📎</label>
        <input type="file" id="imageInput" hidden>

        <input type="text" id="message" placeholder="Type your message...">

        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

</div>
    
     
<script>

/* add message */
function addMessage(text, sender) {
    const messages = document.getElementById("messages");

    const wrapper = document.createElement("div");
    wrapper.classList.add("message", sender);

    const bubble = document.createElement("div");
    bubble.classList.add("bubble");
    bubble.innerHTML = text;

    wrapper.appendChild(bubble);
    messages.appendChild(wrapper);

    messages.scrollTop = messages.scrollHeight;

    return bubble; // 🔥 ต้องมี!
}

/* send */
function sendMessage() {
    const input = document.getElementById("message");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    setTimeout(() => {
        addMessage("We are checking your request...", "bot");
    }, 500);
}

/* quick */
function quickSelect(text) {
    addMessage(text, "user");

    setTimeout(() => {
        addMessage("We are processing your request...", "bot");
    }, 500);
}

/* upload */
document.getElementById("imageInput").addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (e) {
        addMessage(`<img src="${e.target.result}" style="max-width:160px;border-radius:10px;">`, "user");

        addMessage(`
            <span class="typing">
                Verifying<span>.</span><span>.</span><span>.</span>
            </span>
        `, "bot");

        setTimeout(() => {
            addMessage("Thank you 🙏 We will proceed with your refund.", "bot");
        }, 2500);
    };

    reader.readAsDataURL(file);
});

/* enter send */
document.getElementById("message").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        e.preventDefault();
        sendMessage();
    }
});


// ✨ typing animation (พิมพ์ทีละตัว)
function typeText(element, text, speed = 20) {
    let i = 0;
    element.innerHTML = "";

    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }

    typing();
}

// ✨ confidence-based delay
function getTypingDelay(intent) {
    const delayMap = {
        "delivery_delay": 800,
        "wrong_order": 900,
        "food_issue": 900,
        "not_received": 1000,
        "cancel_order": 700
    };

    return delayMap[intent] || 850;
}

// ✨ tone enhancer
function enhanceReply(reply, intent) {
    const apologyMap = {
        "delivery_delay": "We're really sorry for the delay 🙏 ",
        "not_received": "We're really sorry you didn't receive your order 🙏 ",
        "cancel_order": "No worries! "
    };

    if (!reply) {
        return "Sorry, something went wrong. Please try again.";
    }

    const prefix = apologyMap[intent] || "Thanks for reaching out. ";
    return prefix + reply;
}

function sendMessage() {
    const input = document.getElementById("message");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const typingEl = document.getElementById("typing");
    typingEl.style.display = "block";

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
    })
    .then(res => res.json())
    .then(data => {

        const intent = data.intent || "general";
        const delay = getTypingDelay(intent);

        setTimeout(() => {
            typingEl.style.display = "none";

            const finalReply = enhanceReply(data.reply, intent);

            // 🔥 typing animation ใช้ตรงนี้
            const bubble = addMessage("", "bot");
            typeText(bubble, finalReply);

        }, delay);
    })
    .catch(() => {
        typingEl.style.display = "none";
        addMessage("⚠️ Network error. Please try again.", "bot");
    });
}

function quickSelect(text) {

    // 👉 กด Others → เข้า AI mode
    if (text === "Others") {
        addMessage("Others", "user");

        const botText = "Hi! How can I help you today?";
        const textEl = addMessage("", "bot");
        typeText(textEl, botText);

        return;
    }

    // 👉 ปุ่มปกติ 1–5
    document.getElementById("message").value = text;
    sendMessage();
}

// ⌨️ ENTER = SEND
window.onload = function () {
    document.getElementById("message").addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendMessage();
        }
    });
    const imageInput = document.getElementById("imageInput");

    if (imageInput) {
    imageInput.addEventListener("change", function () {
        const file = this.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = function (e) {
            const img = `<img src="${e.target.result}" style="max-width:150px; border-radius:10px;">`;
            addMessage(img, "user");

            fetch("/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "[image_uploaded]"
                })
            });


        // 🤖 BOT ตอบทันที (ขั้นตอนที่ 1)
            const textEl = addMessage("", "bot");
            typeText(textEl, "Thank you for your photo 🙏 We are checking it now. Please wait for a moment.");


        // ⏳ step 3 (10 วิ)
        setTimeout(() => {
            const t3 = addMessage("", "bot");
            typeText(t3, "Thank you for your patience 🙏 We will proceed with your refund.");
        }, 10000);

     };
    reader.readAsDataURL(file);
});   
};
</script>  </body>  
</html>
